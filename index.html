<head>

  <meta name="twitter:image" content="https://www.scottishfashionauthority.com/og-image.png" />

  <!-- Structured data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Scottish Fashion Authority",
    "url": "https://www.scottishfashionauthority.com/",
    "logo": "https://www.scottishfashionauthority.com/og-image.png",
    "description": "The Scottish Fashion Authority champions Scotland's fashion industry — connecting designers, makers and professionals through stories, events and networking.",
    "areaServed": {
      "@type": "Place",
      "name": "Scotland"
    },
    "knowsAbout": ["Scottish fashion", "Scottish textiles", "fashion design", "fashion events", "fashion industry"]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Scotland-inspired palette */
      --navy-deep:   #0a1a2f;   /* saltire night sky */
      --navy:        #12294a;
      --heather:     #6b4a8c;   /* heather purple */
      --heather-lo:  #3a2a54;
      --thistle:     #b18fcf;
      --gold:        #d9b46a;   /* refined heraldic gold */
      --gold-bright: #f0d493;
      --mist:        #e9eef4;
      --paper:       #f6f3ec;
      --ink:         #eaf0f8;

      --maxw: 60rem;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      color: var(--ink);
      font-family: "Jost", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background-color: var(--navy-deep);
      overflow-x: hidden;
      position: relative;
      line-height: 1.6;
    }

    /* ---------- Animated aurora / highland mist background ---------- */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(60% 50% at 20% 15%, rgba(107,74,140,0.55), transparent 60%),
        radial-gradient(55% 45% at 85% 25%, rgba(18,41,74,0.85), transparent 65%),
        radial-gradient(70% 60% at 60% 100%, rgba(217,180,106,0.16), transparent 60%),
        linear-gradient(160deg, var(--navy-deep), #071324 70%);
      background-size: 200% 200%, 200% 200%, 200% 200%, 100% 100%;
      animation: drift 26s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { background-position: 0% 0%,   100% 0%,  50% 100%, 0 0; }
      100% { background-position: 40% 60%, 60% 40%,  40% 60%,  0 0; }
    }

    /* ---------- Subtle tartan weave overlay ---------- */
    .tartan {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.10;
      background-image:
        repeating-linear-gradient(0deg,   transparent 0 22px, rgba(217,180,106,0.6) 22px 24px, transparent 24px 46px),
        repeating-linear-gradient(90deg,  transparent 0 22px, rgba(217,180,106,0.6) 22px 24px, transparent 24px 46px),
        repeating-linear-gradient(0deg,   transparent 0 46px, rgba(177,143,207,0.5) 46px 50px, transparent 50px 92px),
        repeating-linear-gradient(90deg,  transparent 0 46px, rgba(177,143,207,0.5) 46px 50px, transparent 50px 92px);
      mix-blend-mode: overlay;
    }

    /* faint drifting stars for depth */
    .stars {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 15% 30%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.5), transparent);
      animation: twinkle 8s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .9; } }

    /* ---------- Layout ---------- */
    .wrap {
      flex: 1 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 4rem);
    }

    main {
      width: 100%;
      max-width: var(--maxw);
      text-align: center;
      animation: rise 1.1s cubic-bezier(.2,.7,.2,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    /* Thistle emblem */
    .emblem {
      width: clamp(64px, 12vw, 104px);
      height: auto;
      margin: 0 auto 1.75rem;
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.4));
      animation: sway 6s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }

    .eyebrow {
      font-family: "Jost", sans-serif;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: clamp(0.68rem, 1.6vw, 0.82rem);
      color: var(--thistle);
      margin: 0 0 1.1rem;
      padding-left: 0.42em; /* balance the tracking */
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: clamp(2.6rem, 8.5vw, 5.6rem);
      line-height: 1.03;
      margin: 0 0 1.2rem;
      letter-spacing: 0.01em;
      background: linear-gradient(100deg, var(--gold) 20%, var(--gold-bright) 40%, #fff 50%, var(--gold-bright) 60%, var(--gold) 80%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: shimmer 7s linear infinite;
    }
    @keyframes shimmer { to { background-position: 220% center; } }

    .rule {
      width: min(220px, 60%);
      height: 1px;
      margin: 0 auto 1.6rem;
      border: 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .tagline {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.15rem, 3.2vw, 1.65rem);
      color: var(--mist);
      max-width: 40ch;
      margin: 0 auto 2.4rem;
    }

    .coming {
      display: inline-block;
      font-family: "Jost", sans-serif;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: var(--navy-deep);
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      padding: 0.7em 1.6em;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(217,180,106,0.28);
      margin-bottom: 2.8rem;
      padding-left: 1.74em; /* balance tracking */
    }

    /* ---------- Footer ---------- */
    footer {
      flex-shrink: 0;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: rgba(234,240,248,0.55);
    }
    footer a { color: var(--thistle); }

    a { color: var(--gold-bright); }

    /* Screen-reader-only utility */
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0);
      white-space: nowrap; border: 0;
    }

    /* ---------- Motion & contrast preferences ---------- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      h1 { background-position: 0 center; }
    }
    @media (prefers-contrast: more) {
      .tagline, footer { color: #fff; }
      .tartan, .stars { display: none; }
    }
  </style>
</head>
<body>
  <!-- Decorative background layers (hidden from assistive tech) -->
  <div class="aurora" aria-hidden="true"></div>
  <div class="tartan" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <div class="wrap">
    <main>
      <!-- Thistle emblem: Scotland's national flower -->
      <svg class="emblem" viewBox="0 0 100 130" role="img" aria-label="Thistle emblem, the national flower of Scotland" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#d9b46a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <!-- crown of the thistle -->
          <path d="M50 8 C46 16 42 20 42 26 M50 8 C54 16 58 20 58 26 M50 6 L50 24 M44 12 L40 22 M56 12 L60 22" />
          <!-- calyx (bulb) -->
          <path d="M35 40 C35 30 42 26 50 26 C58 26 65 30 65 40 C65 52 58 58 50 58 C42 58 35 52 35 40 Z" fill="#6b4a8c" fill-opacity="0.55"/>
          <path d="M40 44 L45 40 M60 44 L55 40 M50 42 L50 50 M45 46 L48 42 M55 46 L52 42" />
          <!-- stem -->
          <path d="M50 58 L50 120" />
          <!-- leaves -->
          <path d="M50 78 C38 78 30 84 26 96 C40 96 48 90 50 82 Z" fill="#3a2a54" fill-opacity="0.5"/>
          <path d="M50 92 C62 92 70 98 74 110 C60 110 52 104 50 96 Z" fill="#3a2a54" fill-opacity="0.5"/>
        </g>
      </svg>

      <p class="eyebrow">Est. Scotland</p>

      <h1>Scottish Fashion Authority</h1>

      <hr class="rule" aria-hidden="true" />

      <p class="tagline">Championing Scotland&rsquo;s fashion industry — stories, events and the connections that bring its professionals together.</p>

      <p class="coming">Coming Soon</p>
    </main>
  </div>

  <footer>
    <p>&copy; <span id="year">2026</span> Scottish Fashion Authority. All rights reserved.</p>
  </footer>

  <script>
    // Keep the copyright year current without a build step.
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script type="module" src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "2295c14d982b4277a117657cfe3de572"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
